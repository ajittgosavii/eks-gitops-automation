# Auto-generated by AI KubeOps Platform
# Node Hygiene DaemonSet - log rotation, image prune, ephemeral monitoring
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-hygiene-agent
  namespace: kube-system
  labels:
    app: node-hygiene
    managed-by: ai-kubeops-platform
spec:
  selector:
    matchLabels:
      app: node-hygiene
  template:
    metadata:
      labels:
        app: node-hygiene
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: hygiene-agent
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "[$(date)] Node hygiene check starting..."

                # 1. Log rotation - truncate logs > 100MB
                find /host/var/log -name '*.log' -size +100M -exec truncate -s 10M {} \;
                echo "  Log rotation complete"

                # 2. Check disk usage and alert
                DISK_PCT=$(df /host | tail -1 | awk '{print $5}' | tr -d '%')
                if [ "$DISK_PCT" -gt 80 ]; then
                  echo "  CRITICAL: Disk at ${DISK_PCT}%"
                elif [ "$DISK_PCT" -gt 70 ]; then
                  echo "  WARNING: Disk at ${DISK_PCT}%"
                else
                  echo "  Disk OK at ${DISK_PCT}%"
                fi

                # 3. Clean old tmp files (> 7 days)
                find /host/tmp -type f -atime +7 -delete 2>/dev/null
                echo "  Temp cleanup complete"

                # Sleep 1 hour between checks
                sleep 3600
              done
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 100Mi
      volumes:
        - name: host-root
          hostPath:
            path: /
---
# LimitRange to enforce ephemeral-storage defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: ephemeral-storage-defaults
  namespace: default
spec:
  limits:
    - type: Container
      default:
        ephemeral-storage: 1Gi
      defaultRequest:
        ephemeral-storage: 500Mi
      max:
        ephemeral-storage: 5Gi
